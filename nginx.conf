resolver 8.8.8.8 8.8.4.4 valid=30s;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy n8n API
    location /proxy/n8n/ {
        set $n8n_upstream https://renanmenesesadv.app.n8n.cloud;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Headers "X-N8N-API-KEY, Authorization, Content-Type, Accept" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass $n8n_upstream/;
        proxy_set_header Host renanmenesesadv.app.n8n.cloud;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Headers "X-N8N-API-KEY, Authorization, Content-Type, Accept" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    }

    # Proxy GitHub API
    location /proxy/github/ {
        set $github_upstream https://api.github.com;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass $github_upstream/;
        proxy_set_header Host api.github.com;
        proxy_set_header User-Agent MundoEmFoco;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    }
}
