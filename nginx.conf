resolver 8.8.8.8 8.8.4.4 valid=30s;

map $request_method $cors_preflight {
    OPTIONS "true";
    default "";
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy n8n API
    location ~ ^/proxy/n8n/(.*)$ {
        set $n8n_host renanmenesesadv.app.n8n.cloud;
        set $n8n_path $1;

        # CORS preflight
        if ($cors_preflight = "true") {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Headers "X-N8N-API-KEY, Authorization, Content-Type, Accept" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            add_header Content-Type "text/plain charset=UTF-8";
            return 204;
        }

        proxy_method $request_method;
        proxy_pass https://$n8n_host/$n8n_path$is_args$args;
        proxy_set_header Host $n8n_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass_request_body on;
        proxy_pass_request_headers on;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;

        # CORS headers on response
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Headers "X-N8N-API-KEY, Authorization, Content-Type, Accept" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    }

    # Proxy GitHub API
    location ~ ^/proxy/github/(.*)$ {
        set $github_host api.github.com;
        set $github_path $1;

        if ($cors_preflight = "true") {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            add_header Content-Type "text/plain charset=UTF-8";
            return 204;
        }

        proxy_method $request_method;
        proxy_pass https://$github_host/$github_path$is_args$args;
        proxy_set_header Host $github_host;
        proxy_set_header User-Agent MundoEmFoco;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass_request_body on;
        proxy_pass_request_headers on;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    }
}
